<script>
(function(){
  'use strict';

  // ---------- state ----------
  var thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

  function todayISO(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

  var state = {
    bookNo:'1', docNo:'', date: todayISO(),
    receiverName:'', receiverId:'',
    addr:{houseNo:'', moo:'', village:'', soi:'', road:'', subdistrict:'', district:'', province:'', postal:''},
    membershipPeriod:'lifetime', payMethod:'cash',
    signerName:'', signerPosition:'เจ้าหน้าที่ทะเบียนพรรคประชาชน',
    items:[{desc:'ค่าบำรุงพรรคการเมือง (ตลอดชีพ)', amount:''}],
    slip:{dataUrl:'', name:'', w:0, h:0, url:'', uploading:false},
    saving:false
  };

  // ---------- formatters ----------
  function fmt(n){ var v=Number(n)||0; return v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function formatId(raw){
    var d=String(raw||'').replace(/\D/g,'').slice(0,13);
    if(!d) return '';
    return [d.slice(0,1),d.slice(1,5),d.slice(5,10),d.slice(10,12),d.slice(12,13)].filter(Boolean).join('-');
  }
  function thaiDate(iso){
    if(!iso) return '';
    var p=iso.split('-'); if(p.length<3) return iso;
    return (+p[2])+' '+thMonths[(+p[1])-1]+' '+((+p[0])+543);
  }
  function total(){ return state.items.reduce(function(s,it){ return s+(Number(it.amount)||0); },0); }

  function readNumber(numStr){
    var n=parseInt(numStr,10); if(!n) return '';
    var num=['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
    var unit=['','สิบ','ร้อย','พัน','หมื่น','แสน'];
    var str=String(n);
    if(str.length>6){
      var head=str.slice(0,str.length-6), tail=str.slice(str.length-6);
      return readNumber(head)+'ล้าน'+readNumber(tail);
    }
    var r='';
    for(var i=0;i<str.length;i++){
      var dg=parseInt(str[i],10), pos=str.length-i-1;
      if(dg===0) continue;
      if(pos===1 && dg===1) r+='สิบ';
      else if(pos===1 && dg===2) r+='ยี่สิบ';
      else if(pos===0 && dg===1 && str.length>1) r+='เอ็ด';
      else r+=num[dg]+unit[pos];
    }
    return r;
  }
  function bahtText(amount){
    var v=Number(amount); if(isNaN(v)) return '';
    if(v===0) return 'ศูนย์บาทถ้วน';
    var fixed=v.toFixed(2).split('.');
    var baht=readNumber(fixed[0]);
    var sat=parseInt(fixed[1],10);
    var out=baht?baht+'บาท':'';
    if(sat===0) out+='ถ้วน'; else out+=readNumber(fixed[1])+'สตางค์';
    return out;
  }
  // เติม prefix ให้เฉพาะเมื่อยังไม่มีคำนำหน้า (กันซ้ำ เช่น "ต.ตำบลหนองผึ้ง")
  function pfx(val, has, add){
    var v=String(val||'').trim(); if(!v) return '';
    for(var i=0;i<has.length;i++){ if(v.indexOf(has[i])===0) return v; }
    return add+v;
  }
  function buildAddr(a){
    var isBKK=(a.province||'').trim().indexOf('กรุงเทพ')===0;
    var segs=[];
    if(a.houseNo) segs.push(pfx(a.houseNo, ['บ้านเลขที่','เลขที่'], 'บ้านเลขที่ '));
    if(a.moo)     segs.push(pfx(a.moo, ['หมู่'], 'หมู่ '));
    if(a.village) segs.push(a.village);
    if(a.soi)     segs.push(pfx(a.soi, ['ซอย','ซ.'], 'ซอย '));
    if(a.road)    segs.push(pfx(a.road, ['ถนน','ถ.'], 'ถนน '));
    if(a.subdistrict) segs.push(pfx(a.subdistrict, ['ตำบล','แขวง','ต.'], isBKK?'แขวง':'ต.'));
    if(a.district)    segs.push(pfx(a.district, ['อำเภอ','กิ่งอำเภอ','เขต','อ.'], isBKK?'เขต':'อ.'));
    if(a.province)    segs.push(pfx(a.province, ['จังหวัด','กรุงเทพ','จ.'], isBKK?'':'จ.'));
    if(a.postal)      segs.push(a.postal);
    return segs.join(' ');
  }

  // ---------- dom helpers ----------
  var $ = function(id){ return document.getElementById(id); };

  // ---------- postal auto-fill (จากไฟล์ Excel 77 จังหวัด) ----------
  function normDist(s){ return String(s||'').replace(/^(อำเภอ|กิ่งอำเภอ|เขต|อ\.)\s*/,'').trim(); }
  function normProv(s){ return String(s||'').replace(/^(จังหวัด|จ\.)\s*/,'').trim(); }
  function lookupPostal(dist, prov){
    var P=window.POSTAL; if(!P) return '';
    dist=normDist(dist); prov=normProv(prov);
    if(!dist) return '';
    if(prov && P.byProv[prov]){
      var pd=P.byProv[prov];
      if(pd[dist]) return pd[dist];
      if(dist==='เมือง' && pd['เมือง'+prov]) return pd['เมือง'+prov];  // ผู้ใช้พิมพ์ "เมือง" เฉยๆ
    }
    if(P.uniq[dist]) return P.uniq[dist];
    return '';
  }
  function autoPostal(){
    var p=lookupPostal(state.addr.district, state.addr.province);
    if(!p) return;
    var cur=state.addr.postal;
    if(cur==='' || cur===state._autoPostal){   // ไม่ทับค่าที่ผู้ใช้พิมพ์เอง
      state.addr.postal=p; state._autoPostal=p;
      $('addrPostal').value=p;
      $('rAddr').textContent=buildAddr(state.addr)||'..........................................................................';
    }
  }

  // ---------- render ----------
  function render(){
    var t=total();

    // receipt preview
    $('rBookNo').textContent = state.bookNo;
    $('rDocNo').textContent  = state.docNo;
    $('rDate').textContent   = thaiDate(state.date);
    $('rName').textContent   = state.receiverName || '..........................................';
    $('rId').textContent     = state.receiverId || '..........................';
    $('rAddr').textContent   = buildAddr(state.addr) || '..........................................................................';
    $('rPay').textContent    = state.payMethod==='cash' ? 'เงินสด' : 'เงินโอนธนาคาร';
    $('rTotal').textContent  = fmt(t);
    $('rTotalText').textContent = bahtText(t);
    $('rSigner').textContent = state.signerName;
    $('rSignerPos').textContent = state.signerPosition;

    // receipt items
    var ri = state.items.map(function(it){
      var d=(it.desc||'—');
      return '<div class="item"><span class="d">'+escapeHtml(d)+'</span><span class="a">'+fmt(it.amount)+'</span></div>';
    }).join('');
    $('rItems').innerHTML = ri;

    // form total
    $('totalFmt').textContent  = fmt(t);
    $('totalText').textContent = '('+bahtText(t)+')';

    // chips
    document.querySelectorAll('#periodChips .chip').forEach(function(b){
      b.classList.toggle('active', b.dataset.period===state.membershipPeriod);
    });
    document.querySelectorAll('#payChips .chip').forEach(function(b){
      b.classList.toggle('active', b.dataset.pay===state.payMethod);
    });

    // แสดงช่องแนบสลิปเฉพาะเงินโอน
    $('slipBox').classList.toggle('hidden', state.payMethod!=='transfer');

    renderQuick();
    renderItems();
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function renderQuick(){
    var amounts, desc;
    if(state.membershipPeriod==='yearly'){ amounts=[50,150]; desc='ค่าบำรุงพรรคการเมือง (รายปี)'; }
    else { amounts=[500,4999]; desc='ค่าบำรุงพรรคการเมือง (ตลอดชีพ)'; }
    var box=$('quickBtns'); box.innerHTML='';
    amounts.forEach(function(a){
      var btn=document.createElement('button');
      btn.textContent=a.toLocaleString('en-US');
      btn.onclick=function(){
        state.items=[{desc:desc, amount:String(a)}];
        render();
      };
      box.appendChild(btn);
    });
  }

  function renderItems(){
    var list=$('itemList'); list.innerHTML='';
    state.items.forEach(function(it,i){
      var row=document.createElement('div'); row.className='item-row';

      var d=document.createElement('input');
      d.className='in sm desc'; d.placeholder='รายละเอียดการจ่าย'; d.value=it.desc||'';
      d.oninput=function(){ state.items[i].desc=d.value; updateReceiptOnly(); };

      var a=document.createElement('input');
      a.className='in sm amt'; a.placeholder='0.00'; a.inputMode='decimal'; a.value=it.amount||'';
      a.oninput=function(){ state.items[i].amount=a.value.replace(/[^0-9.]/g,''); updateTotalsOnly(); };

      row.appendChild(d); row.appendChild(a);

      if(state.items.length>1){
        var del=document.createElement('button');
        del.className='del'; del.innerHTML='&times;'; del.title='ลบรายการ';
        del.onclick=function(){ state.items.splice(i,1); render(); };
        row.appendChild(del);
      }
      list.appendChild(row);
    });
  }

  // อัปเดตเฉพาะ preview ไม่ re-render input (กันโฟกัสหลุด)
  function updateReceiptOnly(){
    var ri = state.items.map(function(it){
      var d=(it.desc||'—');
      return '<div class="item"><span class="d">'+escapeHtml(d)+'</span><span class="a">'+fmt(it.amount)+'</span></div>';
    }).join('');
    $('rItems').innerHTML = ri;
  }
  function updateTotalsOnly(){
    var t=total();
    $('totalFmt').textContent=fmt(t);
    $('totalText').textContent='('+bahtText(t)+')';
    $('rTotal').textContent=fmt(t);
    $('rTotalText').textContent=bahtText(t);
    updateReceiptOnly();
  }

  // ---------- history ----------
  function renderHistory(rows){
    var box=$('historyList');
    if(!box) return;   // ถ้าไม่มีส่วนแสดงประวัติ
    if(!rows || !rows.length){
      box.innerHTML='<p class="empty">ยังไม่มีรายการ — กด "บันทึกลง Sheet" เพื่อจัดเก็บ</p>';
      return;
    }
    box.innerHTML = rows.map(function(r){
      return '<div class="hist-row"><div><div class="doc">'+escapeHtml(r.docNo)+'</div>'+
             '<div class="meta">'+escapeHtml(r.receiverName||'(ไม่ระบุชื่อ)')+' · '+escapeHtml(r.timestamp)+'</div></div>'+
             '<div class="amt">'+fmt(r.total)+'</div></div>';
    }).join('');
  }

  // ---------- toast ----------
  var toastTimer;
  function toast(msg, isErr){
    var el=$('toast'); $('toastMsg').textContent=msg;
    el.classList.toggle('err', !!isErr);
    el.classList.remove('hidden');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){ el.classList.add('hidden'); }, 2800);
  }

  // ---------- actions ----------
  // ลายเซ็นของเอกสารปัจจุบัน — ใช้กันบันทึกซ้ำ
  function currentKey(){
    return [state.docNo, state.receiverName, total(), JSON.stringify(state.items)].join('|');
  }

  function saveSheet(onDone){
    if(state.saving){ return; }
    state.saving=true;

    var a=state.addr;
    var payload={
      docNo:state.docNo, bookNo:state.bookNo, date:state.date,
      receiverName:state.receiverName, receiverId:state.receiverId,
      houseNo:a.houseNo, moo:a.moo, village:a.village, soi:a.soi, road:a.road,
      subdistrict:a.subdistrict, district:a.district, province:a.province, postal:a.postal,
      items:JSON.stringify(state.items),
      total:total(),
      payMethod:state.payMethod, membershipPeriod:state.membershipPeriod,
      signerName:state.signerName, signerPosition:state.signerPosition,
      slipUrl:state.slip.url||'', slipName:state.slip.name||''
    };

    google.script.run
      .withSuccessHandler(function(){
        state.saving=false;
        state.lastSavedKey=currentKey();
        toast('บันทึกลง Google Sheet เรียบร้อย');
        google.script.run.withSuccessHandler(renderHistory).getRecentRows(8);
        if(typeof onDone==='function') onDone(true);
      })
      .withFailureHandler(function(err){
        state.saving=false;
        toast('บันทึกไม่สำเร็จ: '+(err && err.message ? err.message : err), true);
        if(typeof onDone==='function') onDone(false);
      })
      .saveRow(payload);
  }

  function newDoc(){
    google.script.run
      .withSuccessHandler(function(docNo){ state.docNo=docNo; $('docNo').value=docNo; })
      .withFailureHandler(function(){ /* keep old */ })
      .getNextDocNo();
    state.receiverName=''; state.receiverId='';
    state.addr={houseNo:'',moo:'',village:'',soi:'',road:'',subdistrict:'',district:'',province:'',postal:''};
    state._autoPostal=null;
    state.items=[{desc:'ค่าบำรุงพรรคการเมือง ('+(state.membershipPeriod==='yearly'?'รายปี':'ตลอดชีพ')+')',amount:''}];
    ['receiverName','receiverId','addrHouseNo','addrMoo','addrVillage','addrSoi','addrRoad','addrSub','addrDistrict','addrProvince','addrPostal'].forEach(function(id){ $(id).value=''; });
    clearSlip();
    render();
    toast('เริ่มเอกสารใหม่');
  }

  // ---------- export Excel (ยกเว้นสลิป) ----------
  function exportExcel(){
    var btn=$('btnExport'); btn.disabled=true; $('btnExportLabel').textContent='กำลังสร้างไฟล์…';
    google.script.run
      .withSuccessHandler(function(res){
        btn.disabled=false; $('btnExportLabel').textContent='บันทึก Excel';
        if(!res || !res.b64){ toast('ไม่มีข้อมูลให้ส่งออก', true); return; }
        var bin=atob(res.b64), len=bin.length, bytes=new Uint8Array(len);
        for(var i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
        var blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        var a=document.createElement('a');
        a.href=URL.createObjectURL(blob); a.download=res.name||'ใบเสร็จ.xlsx';
        document.body.appendChild(a); a.click();
        setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },1500);
        toast('บันทึกไฟล์ Excel เรียบร้อย');
      })
      .withFailureHandler(function(err){
        btn.disabled=false; $('btnExportLabel').textContent='บันทึก Excel';
        toast('ส่งออกไม่สำเร็จ: '+(err && err.message ? err.message : err), true);
      })
      .exportExcel();
  }

  function printReceipt(){
    // เงินโอน: ต้องแนบสลิปก่อน
    if(state.payMethod==='transfer' && !(state.slip && state.slip.dataUrl)){
      toast('กรุณาแนบสลิปการโอนเงินก่อนพิมพ์', true);
      var sb=$('slipBox'); sb.classList.remove('hidden');
      sb.scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    // ถ้าสลิปยังอัปโหลดไม่เสร็จ → พิมพ์ได้เลย แล้วค่อยบันทึกอัตโนมัติเมื่ออัปโหลดเสร็จ
    if(state.payMethod==='transfer' && state.slip.uploading){
      state._savePending=true;
    } else if(!state.saving && state.lastSavedKey!==currentKey()){
      saveSheet();
    }
    // หน่วงเล็กน้อยให้คำสั่งบันทึกถูกส่งออกก่อน แล้วค่อยเปิดหน้าต่างพิมพ์
    setTimeout(function(){ window.print(); }, 500);
  }

  // ---------- slip upload ----------
  function handleSlipFile(file){
    if(!file) return;
    if(!/^image\//.test(file.type)){ toast('กรุณาเลือกไฟล์รูปภาพ', true); return; }
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var maxW=1200, scale=Math.min(1, maxW/img.width);
        var w=Math.round(img.width*scale), h=Math.round(img.height*scale);
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        var dataUrl=c.toDataURL('image/jpeg',0.82);
        state.slip={dataUrl:dataUrl, name:file.name, w:w, h:h, url:'', uploading:true};
        $('slipThumb').src=dataUrl;
        $('slipName').textContent=file.name+' · กำลังอัปโหลด…';
        $('slipPreview').classList.remove('hidden');
        $('slipDrop').textContent='เปลี่ยนรูปสลิป';
        state.lastSavedKey=null;   // มีสลิปใหม่ → ให้บันทึกใหม่ตอนพิมพ์

        // อัปโหลดขึ้น Drive ทันที (แยกจากตอนพิมพ์) — ตั้งชื่อไฟล์ = เลขบัตร
        google.script.run
          .withSuccessHandler(function(res){
            state.slip.uploading=false;
            state.slip.url=(res && res.url) ? res.url : '';
            $('slipName').textContent=file.name+' ✓';
            if(state._savePending){ state._savePending=false; saveSheet(); }   // พิมพ์ไปก่อนแล้ว → บันทึกตอนนี้
          })
          .withFailureHandler(function(err){
            state.slip.uploading=false; state.slip.url='';
            $('slipName').textContent=file.name+' · อัปโหลดไม่สำเร็จ';
            toast('อัปโหลดสลิปไม่สำเร็จ: '+(err && err.message ? err.message : err), true);
            if(state._savePending){ state._savePending=false; saveSheet(); }   // บันทึกแถวไว้ (ไม่มีลิงก์สลิป)
          })
          .uploadSlip(dataUrl, state.receiverId, state.docNo);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function clearSlip(){
    state.slip={dataUrl:'', name:'', w:0, h:0, url:'', uploading:false};
    $('slipInput').value='';
    $('slipThumb').src='';
    $('slipPreview').classList.add('hidden');
    $('slipDrop').textContent='📎 ลากรูปมาวางที่นี่ หรือคลิกเลือก';
  }

  // ---------- bind inputs ----------
  function bind(){
    $('bookNo').oninput=function(){ state.bookNo=this.value; $('rBookNo').textContent=this.value; };
    $('docNo').oninput =function(){ state.docNo=this.value; $('rDocNo').textContent=this.value; };
    $('date').oninput  =function(){ state.date=this.value; $('rDate').textContent=thaiDate(this.value); };
    $('receiverName').oninput=function(){ state.receiverName=this.value; $('rName').textContent=this.value||'..........................................'; };
    $('receiverId').oninput=function(){
      var v=this.value.replace(/\D/g,'').slice(0,13);
      this.value=v; state.receiverId=v; $('rId').textContent=v||'..........................';
    };
    var addrMap={addrHouseNo:'houseNo',addrMoo:'moo',addrVillage:'village',addrSoi:'soi',addrRoad:'road',addrSub:'subdistrict',addrDistrict:'district',addrProvince:'province',addrPostal:'postal'};
    Object.keys(addrMap).forEach(function(id){
      $(id).oninput=function(){
        state.addr[addrMap[id]]=this.value;
        if(id==='addrDistrict'||id==='addrProvince') autoPostal();
        $('rAddr').textContent=buildAddr(state.addr)||'..........................................................................';
      };
    });
    $('signerName').oninput=function(){ state.signerName=this.value; $('rSigner').textContent=this.value; };
    $('signerPosition').oninput=function(){ state.signerPosition=this.value; $('rSignerPos').textContent=this.value; };

    document.querySelectorAll('#periodChips .chip').forEach(function(b){
      b.onclick=function(){ state.membershipPeriod=b.dataset.period; render(); };
    });
    document.querySelectorAll('#payChips .chip').forEach(function(b){
      b.onclick=function(){ state.payMethod=b.dataset.pay; render(); };
    });

    $('btnPrint').onclick=printReceipt;
    $('btnNew').onclick=newDoc;
    $('btnExport').onclick=exportExcel;

    // คลิกที่ popup เพื่อปิด
    $('toast').onclick=function(){ this.classList.add('hidden'); };

    // slip upload
    var sd=$('slipDrop');
    sd.onclick=function(){ $('slipInput').click(); };
    $('slipInput').onchange=function(){ handleSlipFile(this.files && this.files[0]); };
    $('slipRemove').onclick=clearSlip;

    // drag & drop รูปสลิป
    ['dragenter','dragover'].forEach(function(ev){
      sd.addEventListener(ev,function(e){ e.preventDefault(); e.stopPropagation(); sd.classList.add('dragover'); });
    });
    ['dragleave','dragend','drop'].forEach(function(ev){
      sd.addEventListener(ev,function(e){ e.preventDefault(); e.stopPropagation(); sd.classList.remove('dragover'); });
    });
    sd.addEventListener('drop',function(e){
      var dt=e.dataTransfer;
      if(dt && dt.files && dt.files[0]) handleSlipFile(dt.files[0]);
    });
    // กันเบราว์เซอร์เปิดรูปแทนถ้าวางพลาดนอกกรอบ
    ['dragover','drop'].forEach(function(ev){
      window.addEventListener(ev,function(e){ e.preventDefault(); });
    });

  }

  // ---------- card reader (ตรวจจับ + อ่านอัตโนมัติ) ----------
  var AGENT_URL='http://127.0.0.1:8765';
  var card={present:false, busy:false, lastRead:0};

  function setCardStatus(text, cls){
    var el=$('cardStatus'); if(!el) return;
    if(!text){ el.classList.add('hidden'); return; }
    el.textContent=text;
    el.className='card-status '+(cls||'');
  }

  function startCardWatch(){
    setInterval(pollCard, 2500);
  }

  function pollCard(){
    if(card.busy) return;
    fetch(AGENT_URL+'/status')
      .then(function(r){ return r.json(); })
      .then(function(s){
        var present = !!(s && s.ok && s.readerConnected && s.cardPresent);
        if(present && !card.present && (Date.now()-card.lastRead>4000)){
          card.present=true; autoReadCard();
        } else if(!present){
          card.present=false;
        }
      })
      .catch(function(){ card.present=false; });  // agent ไม่เปิด → เงียบไว้ (กรอกเองได้)
  }

  function autoReadCard(){
    card.busy=true;
    setCardStatus('กำลังอ่านข้อมูลจากชิปบัตร…','reading');
    var ctrl=new AbortController();
    var timer=setTimeout(function(){ ctrl.abort(); }, 15000);
    fetch(AGENT_URL+'/read',{signal:ctrl.signal})
      .then(function(r){ return r.json(); })
      .then(function(res){
        clearTimeout(timer);
        if(res && res.ok && res.data){
          applyCardData(res.data);
          setCardStatus('✓ อ่านบัตรสำเร็จ — เติมข้อมูลให้แล้ว','done');
          toast('อ่านบัตรประชาชนสำเร็จ');
        } else {
          setCardStatus((res && res.error) ? res.error : 'อ่านบัตรไม่สำเร็จ','reading');
        }
      })
      .catch(function(){ setCardStatus('อ่านบัตรไม่สำเร็จ ลองเสียบใหม่','reading'); })
      .then(function(){ card.busy=false; card.lastRead=Date.now(); });
  }

  function applyCardData(d){
    state.receiverName = d.fullName || '';
    state.receiverId   = (d.cid||'').replace(/\D/g,'').slice(0,13);
    var a = d.address || {};
    state.addr = {
      houseNo:     a.houseNo     || '',
      moo:         a.moo         || '',
      village:     a.village     || '',
      soi:         a.soi         || '',
      road:        a.road        || '',
      subdistrict: a.subdistrict || '',
      district:    a.district    || '',
      province:    a.province    || '',
      postal:      a.postal      || ''
    };
    // sync DOM inputs
    $('receiverName').value = state.receiverName;
    $('receiverId').value   = state.receiverId;
    $('addrHouseNo').value  = state.addr.houseNo;
    $('addrMoo').value      = state.addr.moo;
    $('addrVillage').value  = state.addr.village;
    $('addrSoi').value      = state.addr.soi;
    $('addrRoad').value     = state.addr.road;
    $('addrSub').value      = state.addr.subdistrict;
    $('addrDistrict').value = state.addr.district;
    $('addrProvince').value = state.addr.province;
    $('addrPostal').value   = state.addr.postal;
    autoPostal();   // เติมรหัสไปรษณีย์จากอำเภอ/จังหวัดที่อ่านได้
    render();
  }

  // ---------- init ----------
  function fillForm(){
    $('bookNo').value=state.bookNo;
    $('docNo').value=state.docNo;
    $('date').value=state.date;
    $('signerPosition').value=state.signerPosition;
    var items=$('itemList');
  }

  function init(){
    // logo
    if(window.LOGO_SRC){ $('brandLogo').src=window.LOGO_SRC; $('receiptLogo').src=window.LOGO_SRC; }
    if(window.QR_SRC){ $('receiptQR').src=window.QR_SRC; }
    startCardWatch();   // ตรวจจับบัตรอัตโนมัติ
    fillForm();
    bind();
    render();

    // โหลดข้อมูลเริ่มต้นจาก backend (เลขเอกสารถัดไป + ประวัติ)
    google.script.run
      .withSuccessHandler(function(data){
        if(data){
          if(data.nextDocNo){ state.docNo=data.nextDocNo; $('docNo').value=data.nextDocNo; $('rDocNo').textContent=data.nextDocNo; }
          if(data.today){ state.date=data.today; $('date').value=data.today; $('rDate').textContent=thaiDate(data.today); }
          renderHistory(data.recent);
        }
      })
      .withFailureHandler(function(err){
        toast('โหลดข้อมูลเริ่มต้นไม่สำเร็จ: '+(err && err.message ? err.message : err), true);
        renderHistory([]);
      })
      .getInitData();
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
